name: Bug report
description: Report incorrect behavior, a crash, or a numerical discrepancy
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For **security** issues, do not file here — see
        [SECURITY.md](https://github.com/CyberdyneCorp/CalculixPP/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
      placeholder: The C3D20 stress recovery diverges from the reference deck by ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal case — the `.inp` deck (or a snippet), the analysis card, and how you drove it (CLI `ccxpp`, C++, Python, or `just`).
      placeholder: |
        build/apps/ccxpp beam10p.inp -o beam10p
        # or a Python snippet: calculixpp.solve_text(deck)
    validations:
      required: true
  - type: input
    id: interface
    attributes:
      label: Interface
      placeholder: CLI (ccxpp) / C++ API / Python bindings
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, compiler + version, CMake version, NumPP/SciPP versions, commit/tag.
      placeholder: |
        Ubuntu 24.04, GCC 13.3, CMake 3.28, NumPP v1.6.0, SciPP v1.5.0, commit abc1234
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant build or run output (paste as text or attach files).
      render: shell
