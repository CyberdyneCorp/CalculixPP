name: Feature request
description: Propose a new capability (element, material, procedure, backend, binding, tooling)
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or limitation motivating the request (e.g. a CalculiX card not yet supported).
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed capability
      description: What you'd like CalculiX++ to do. Larger features are developed spec-first with OpenSpec — see CONTRIBUTING.md.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Elements / materials
        - Analysis procedure (static / dynamic / thermal / contact / ...)
        - Input deck parsing (.inp keyword cards)
        - Solvers / numerics (NumPP / SciPP)
        - Compute backend (CPU / CUDA / OpenCL / Metal)
        - Language bindings (Python)
        - Build / packaging / tooling
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or existing workarounds, if any.
